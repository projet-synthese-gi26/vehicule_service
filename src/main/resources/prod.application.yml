server:
  port: 8080

spring:
  application:
    name: vehicule-service
    forward-headers-strategy: framework
    
  docker:
    compose:
      enabled: false
  # Configuration Multipart (Uploads)
  webflux:
    multipart:
      max-in-memory-size: 256KB # Taille en RAM avant écriture disque (si besoin)
      max-file-size: 10MB       # Taille max d'un fichier
      max-request-size: 10MB    # Taille max de la requête totale

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      config-url: /vehicule/v3/api-docs  # indispensable pour faire marcher le swagger en ligne (dans notre architecture actuel)

  # Configuration des Codecs (Pour éviter les erreurs "DataBufferLimitException")
  codec:
    max-in-memory-size: 10MB

  # ------------------------------------------------------------------
  # DATABASE — Liquibase
  # ------------------------------------------------------------------
  liquibase:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:yowyob}
    user: ${DB_LIQUIBASE_USERNAME}
    password: ${DB_LIQUIBASE_PASSWORD}
    enabled: true

  # ------------------------------------------------------------------
  # DATABASE — R2DBC réactif
  # ------------------------------------------------------------------
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:yowyob}?schema=${DB_SCHEMA:public}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  sql:
    init:
      mode: never

  # ------------------------------------------------------------------
  # REDIS CLUSTER
  # ------------------------------------------------------------------
  data:
    redis:
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      cluster:
        nodes:
          - ${REDIS_HOST}:7001
          - ${REDIS_HOST}:7002
          - ${REDIS_HOST}:7003
          - ${REDIS_HOST}:7004
          - ${REDIS_HOST}:7005
          - ${REDIS_HOST}:7006
        max-redirects: 3
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
        cluster:
          refresh:
            adaptive: true
            period: 30s
            dynamic-refresh-sources: false

  # ------------------------------------------------------------------
  # KAFKA — Connexion sécurisée SASL/SCRAM-SHA-256
  # ------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:29092}

    # ── Authentification SASL/SCRAM-SHA-256 ────────────────────────
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_BACKEND_USER}"
        password="${KAFKA_BACKEND_PASSWORD}";
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# CUSTOM CONFIG 
application:
  external:
    stock-service-url: http://${EXTERNAL_HOST:localhost}:8081
    media-service-url: https://traefikdev.yowyob.com/media

  kafka:
    topics:
      product-events: test-topic

management:
  endpoints:
    web:
      exposure:
        include: ["health","info","prometheus"]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# AUTH SERVICE
auth:
  service:
    url: https://traefikdev.yowyob.com/auth

# RESILIENCE4J 
resilience4j:
  circuitbreaker:
    instances:
      stock-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
